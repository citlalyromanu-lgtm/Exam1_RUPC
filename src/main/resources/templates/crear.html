<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Habitación</title>
</head>
<body>

<h1>Agregar Nueva Habitación</h1>

<form th:action="@{/habitaciones/guardar}" th:object="${habitacion}" method="post">

    <div>
        <label for="id">ID:</label><br>
        <input type="number" id="id" th:field="*{id}" required>
    </div>
    <br>

    <div>
        <label for="numero">Número de Habitación:</label><br>
        <input type="number" id="numero" th:field="*{numero}" required>
    </div>
    <br>

    <div>
        <label for="tipo">Tipo:</label><br>
        <input type="text" id="tipo" th:field="*{tipo}" maxlength="50" required>
    </div>
    <br>

    <div>
        <label for="precio">Precio:</label><br>
        <input type="number" id="precio" th:field="*{precio}" step="0.01" required>
    </div>
    <br>

    <div>
        <label for="disponible">¿Disponible?</label>
        <input type="checkbox" id="disponible" th:field="*{disponible}">
    </div>
    <br><br>

    <button type="submit">Guardar</button>
    <a th:href="@{/habitaciones}">
        <button type="button">Cancelar</button>
    </a>

</form>

</body>
</html>
